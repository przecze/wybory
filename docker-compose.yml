secrets:
  fly_token:
    file: ./flyio_token_gateway.txt

services:
  suspender:
    image: alpine:3.19
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl jq
        FLY_API_TOKEN=$$(cat /run/secrets/fly_token)
        API="https://api.machines.dev/v1/apps/$$FLY_APP_NAME/machines"
        AUTH="Authorization: Bearer $$FLY_API_TOKEN"
        while true; do
          json=$$(curl -sf -H "$$AUTH" "$$API")
          machine_id=$$(echo "$$json" | jq -r '.[0].id // empty')
          state=$$(echo "$$json" | jq -r '.[0].state // empty')
          if [ -n "$$machine_id" ] && [ "$$state" != "suspended" ] && [ "$$state" != "suspending" ]; then
            curl -sf -X POST -H "$$AUTH" "$$API/$$machine_id/suspend" || true
            echo "Suspended machine $$machine_id"
          fi
          sleep 60
        done
    secrets:
      - fly_token
    environment:
      - FLY_APP_NAME=wybory-jan-czechowski-com
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    entrypoint: ["sh", "/entrypoint.sh"]
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./entrypoint.gateway.sh:/entrypoint.sh:ro
      - ./gateway.conf:/etc/wireguard/gateway.conf:ro
      - ./nginx-gateway.conf:/etc/nginx/templates/default.conf:ro
    environment:
      VIRTUAL_HOST: wybory.janczechowski.com
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: wybory.janczechowski.com
    labels:
      com.github.nginx-proxy.nginx-proxy.http2.enable: "false"
    networks:
      - nginx-proxy
    restart: unless-stopped

networks:
  nginx-proxy:
    external: true
